<script>
(function() {
  /* Sticky header shadow */
  const header = document.getElementById('dmHeader');
  const wrap   = document.getElementById('wrap');
  wrap.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', wrap.scrollTop > 4);
  }, { passive: true });

  /* Search filter */
  const searchInput = document.querySelector('.search_bar');
  const dmItems     = document.querySelectorAll('.dm_item');
  searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    dmItems.forEach(item => {
      const name = item.querySelector('.dm_name').textContent.toLowerCase();
      const show = !q || name.includes(q);
      item.style.display = show ? '' : 'none';
    });
  });

  /* Nav active state */
  document.querySelectorAll('.nav_btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav_btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  /* Swipe left to dismiss (mobile) */
  let touchStartX = null;
  dmItems.forEach(item => {
    item.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    item.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (dx < -60) {
        item.style.transition = 'transform .25s ease, opacity .25s ease';
        item.style.transform  = 'translateX(-80px)';
        item.style.opacity    = '0';
        setTimeout(() => {
          item.style.transition = '';
          item.style.transform  = '';
          item.style.opacity    = '';
        }, 700);
      }
      touchStartX = null;
    }, { passive: true });
  });
})();
</script>
